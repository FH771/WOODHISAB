<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labor Pro System</title>

<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
button{padding:10px;border:none;background:#3b82f6;color:#fff;border-radius:6px;cursor:pointer}
input,select{padding:10px;width:100%;margin-top:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #ddd}
th{background:#1e293b;color:#fff}
.actions button{margin-right:5px}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<h2>Labor Management PRO</h2>
<button onclick="exportCSV()">⬇ Export Excel</button>
<button onclick="backup()">💾 Backup</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Add Labor</h3>
<input id="name" placeholder="Name">
<input id="rate" type="number" placeholder="Rate">
<button onclick="addLabor()">Add</button>
</div>

<div class="card">
<h3>Labor List</h3>
<table>
<thead>
<tr><th>Name</th><th>Rate</th><th>Action</th></tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h3>Attendance</h3>
<input type="date" id="date">
<select id="labor"></select>
<input id="advance" type="number" placeholder="Advance">
<button onclick="save()">Save</button>
</div>

<div class="card">
<h3>Report</h3>
<input type="date" id="from"> to
<input type="date" id="to">
<button onclick="update()">Filter</button>

<table>
<thead>
<tr><th>Name</th><th>Days</th><th>Earned</th><th>Paid</th><th>Due</th></tr>
</thead>
<tbody id="report"></tbody>
</table>
</div>

</div>
</div>

<script>
let labors = JSON.parse(localStorage.labors||"[]");
let logs = JSON.parse(localStorage.logs||"[]");

function login(){
    if(user.value=="admin" && pass.value=="1234"){
        loginBox.style.display="none";
        app.style.display="block";
        update();
    }else alert("Wrong login");
}

function logout(){
    location.reload();
}

function addLabor(){
    if(!name.value || !rate.value) return alert("Fill");
    labors.push({id:Date.now(),name:name.value,rate:+rate.value});
    localStorage.labors=JSON.stringify(labors);
    update();
}

function del(id){
    labors = labors.filter(x=>x.id!=id);
    localStorage.labors=JSON.stringify(labors);
    update();
}

function save(){
    logs.push({
        id:labor.value,
        date:date.value,
        advance:+advance.value||0
    });
    localStorage.logs=JSON.stringify(logs);
    alert("Saved");
}

function exportCSV(){
    let csv="Name,Days,Earned,Paid,Due\n";

    labors.forEach(l=>{
        let my=logs.filter(x=>x.id==l.id);
        let d=my.length;
        let e=d*l.rate;
        let p=my.reduce((s,x)=>s+x.advance,0);
        let due=e-p;

        csv+=`${l.name},${d},${e},${p},${due}\n`;
    });

    let blob=new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="report.csv";
    a.click();
}

function backup(){
    let data = JSON.stringify({labors,logs});
    let blob=new Blob([data]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="backup.json";
    a.click();
}

function update(){
    list.innerHTML="";
    labor.innerHTML="";

    labors.forEach(l=>{
        list.innerHTML+=`
        <tr>
        <td>${l.name}</td>
        <td>${l.rate}</td>
        <td class="actions">
        <button onclick="del(${l.id})">❌</button>
        </td>
        </tr>`;

        labor.innerHTML+=`<option value="${l.id}">${l.name}</option>`;
    });

    let f=from.value;
    let t=to.value;

    report.innerHTML="";

    labors.forEach(l=>{
        let my = logs.filter(x=>x.id==l.id);

        if(f && t){
            my = my.filter(x=>x.date>=f && x.date<=t);
        }

        let d=my.length;
        let e=d*l.rate;
        let p=my.reduce((s,x)=>s+x.advance,0);
        let due=e-p;

        report.innerHTML+=`
        <tr>
        <td>${l.name}</td>
        <td>${d}</td>
        <td>${e}</td>
        <td>${p}</td>
        <td style="color:${due>0?'red':'green'}">${due}</td>
        </tr>`;
    });
}

date.valueAsDate=new Date();
</script>

</body>
</html>
